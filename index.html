<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hologram Character Chatbot</title>

<style>
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#scene {
  display: block;
  width: 100%;
  height: 100%;
}

#chat {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.8);
  padding: 10px;
}

#messages {
  height: 120px;
  overflow-y: auto;
  margin-bottom: 5px;
  padding: 4px;
  border: 1px solid #333;
  border-radius: 4px;
}

#messages .message {
  margin-bottom: 4px;
  line-height: 1.4;
}

#chat-form {
  display: flex;
  gap: 4px;
  align-items: center;
}

#input {
  flex: 1;
  padding: 8px;
  background: #111;
  color: white;
  border: 1px solid #444;
  border-radius: 4px;
  font-size: 1rem;
}

#input:focus {
  outline: 2px solid #00ffff;
  outline-offset: 2px;
}

#send-btn {
  padding: 8px 16px;
  background: #00ffff;
  color: black;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: bold;
}

#send-btn:hover {
  background: #00cccc;
}

#send-btn:focus {
  outline: 2px solid white;
  outline-offset: 2px;
}

#send-btn:disabled {
  background: #006666;
  cursor: not-allowed;
}

#api-key-section {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0, 0, 0, 0.8);
  padding: 8px;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  border: 1px solid #333;
}

#api-key-label {
  font-size: 0.75rem;
  color: #aaa;
}

#api-key-input {
  padding: 4px 8px;
  background: #111;
  color: white;
  border: 1px solid #444;
  border-radius: 4px;
  font-size: 0.85rem;
  width: 220px;
}

#api-key-input:focus {
  outline: 2px solid #00ffff;
  outline-offset: 2px;
}

#api-key-save {
  padding: 4px 8px;
  background: #00ffff;
  color: black;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: bold;
}

#api-key-save:hover {
  background: #00cccc;
}

#api-key-save:focus {
  outline: 2px solid white;
  outline-offset: 2px;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

#status-msg {
  font-size: 0.75rem;
  color: #aaa;
  margin-top: 4px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

</head>
<body>

<canvas id="scene" aria-label="3D hologram character rotating in scene" role="img"></canvas>

<section id="api-key-section" aria-label="API key configuration">
  <label id="api-key-label" for="api-key-input">OpenAI API Key</label>
  <input
    id="api-key-input"
    type="password"
    placeholder="sk-..."
    aria-describedby="api-key-label"
    autocomplete="off"
  >
  <button id="api-key-save" type="button">Save Key</button>
  <span id="api-key-status" aria-live="polite" class="sr-only"></span>
</section>

<section id="chat" aria-label="Chat with hologram">
  <div
    id="messages"
    role="log"
    aria-live="polite"
    aria-relevant="additions"
    aria-label="Chat messages"
  ></div>
  <form id="chat-form">
    <label for="input" class="sr-only">Message to hologram</label>
    <input
      id="input"
      type="text"
      placeholder="Talk to hologram..."
      autocomplete="off"
      aria-label="Message to hologram"
    >
    <button id="send-btn" type="submit">Send</button>
  </form>
  <div id="status-msg" aria-live="polite"></div>
</section>

<script>

// ── Three.js scene setup ──────────────────────────────────────────────────────

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("scene"),
  alpha: true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const light = new THREE.PointLight(0xffffff, 2);
light.position.set(2, 2, 2);
scene.add(light);

const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

camera.position.z = 3;

let model;

const loader = new THREE.GLTFLoader();

loader.load(
  "character.glb",
  function (gltf) {
    model = gltf.scene;
    scene.add(model);
  },
  undefined,
  function (error) {
    // Fallback: render a simple hologram-style wireframe sphere
    console.warn("character.glb not found, showing fallback geometry.", error);
    const geometry = new THREE.IcosahedronGeometry(1, 1);
    const material = new THREE.MeshBasicMaterial({
      color: 0x00ffff,
      wireframe: true
    });
    model = new THREE.Mesh(geometry, material);
    scene.add(model);
  }
);

function animate() {
  requestAnimationFrame(animate);
  if (model) {
    model.rotation.y += 0.005;
  }
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", function () {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── API key management ────────────────────────────────────────────────────────
// Note: storing an API key in localStorage is convenient for local use but
// exposes it to any JS running on the same origin. Use a backend proxy for
// production deployments.

const API_KEY_STORAGE = "hologram_openai_api_key";

function getSavedApiKey() {
  return localStorage.getItem(API_KEY_STORAGE) || "";
}

function saveApiKey(key) {
  localStorage.setItem(API_KEY_STORAGE, key);
}

const apiKeyInput = document.getElementById("api-key-input");
const apiKeyStatus = document.getElementById("api-key-status");

// Pre-fill from localStorage if available
apiKeyInput.value = getSavedApiKey();

document.getElementById("api-key-save").addEventListener("click", function () {
  const key = apiKeyInput.value.trim();
  if (!key) {
    apiKeyStatus.textContent = "Please enter an API key.";
    return;
  }
  saveApiKey(key);
  apiKeyStatus.textContent = "API key saved.";
  setTimeout(function () { apiKeyStatus.textContent = ""; }, 3000);
});

// ── Chat interface ────────────────────────────────────────────────────────────

// Conversation history keeps context across multiple exchanges
const conversationHistory = [];

document.getElementById("chat-form").addEventListener("submit", function (event) {
  event.preventDefault();
  sendMessage();
});

function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  const apiKey = getSavedApiKey();
  if (!apiKey) {
    addMessage("System", "Please enter and save your OpenAI API key first.");
    return;
  }

  addMessage("You", text);
  conversationHistory.push({ role: "user", content: text });
  input.value = "";

  const sendBtn = document.getElementById("send-btn");
  const statusMsg = document.getElementById("status-msg");
  sendBtn.disabled = true;
  statusMsg.textContent = "Hologram is thinking…";

  fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: conversationHistory
    })
  })
  .then(function (r) {
    if (!r.ok) {
      return r.json().then(function (err) {
        throw new Error(err.error && err.error.message ? err.error.message : "API error " + r.status);
      });
    }
    return r.json();
  })
  .then(function (data) {
    const reply = data.choices[0].message.content;
    conversationHistory.push({ role: "assistant", content: reply });
    addMessage("Hologram", reply);
  })
  .catch(function (err) {
    addMessage("System", "Error: " + err.message);
  })
  .finally(function () {
    sendBtn.disabled = false;
    statusMsg.textContent = "";
  });
}

function addMessage(sender, text) {
  const box = document.getElementById("messages");
  const msgEl = document.createElement("div");
  msgEl.className = "message";
  const senderEl = document.createElement("strong");
  senderEl.textContent = sender + ": ";
  msgEl.appendChild(senderEl);
  msgEl.appendChild(document.createTextNode(text));
  box.appendChild(msgEl);
  box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
